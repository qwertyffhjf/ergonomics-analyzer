name: Анализ эргономики видео

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Ссылка на видео (прямая ссылка на файл)'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download video
        run: wget -O input_video.mp4 "${{ inputs.video_url }}"

      - name: Run analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/analyze_video.py input_video.mp4

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ergonomics-report
          path: report.json
